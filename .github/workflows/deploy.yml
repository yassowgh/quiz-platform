name: Build & Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Write env file
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_DATABASE_URL=${{ secrets.FIREBASE_DATABASE_URL }}" >> .env.local

      - name: Build
        run: npm run build

      - name: Deploy RTDB rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$SERVICE_ACCOUNT" > /tmp/sa.json
          npx --yes firebase-tools deploy --only database --project quiz-platform-e46ba --non-interactive

      - name: Deploy Firestore rules via REST API
        env:
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          pip install cryptography --quiet
          python3 - <<'PYEOF'
import json, time, base64, os, urllib.request, urllib.parse
from cryptography.hazmat.primitives import hashes, serialization
from cryptography.hazmat.primitives.asymmetric import padding

sa = json.loads(os.environ['SERVICE_ACCOUNT'])
now = int(time.time())

def b64(data):
    if isinstance(data, str): data = data.encode()
    return base64.urlsafe_b64encode(data).rstrip(b'=').decode()

header = b64(json.dumps({"alg":"RS256","typ":"JWT"}))
payload = b64(json.dumps({"iss":sa['client_email'],"sub":sa['client_email'],
  "aud":"https://oauth2.googleapis.com/token","iat":now,"exp":now+3600,
  "scope":"https://www.googleapis.com/auth/cloud-platform"}))

private_key = serialization.load_pem_private_key(sa['private_key'].encode(), password=None)
signature = private_key.sign(f"{header}.{payload}".encode(), padding.PKCS1v15(), hashes.SHA256())
jwt_token = f"{header}.{payload}.{b64(signature)}"

req = urllib.request.Request("https://oauth2.googleapis.com/token",
  data=urllib.parse.urlencode({"grant_type":"urn:ietf:params:oauth:grant-type:jwt-bearer","assertion":jwt_token}).encode(),
  method="POST")
with urllib.request.urlopen(req) as r:
  access_token = json.loads(r.read())['access_token']

project = sa['project_id']
with open('firestore.rules') as f:
  rules_content = f.read()

def api(url, data=None, method='POST'):
  req = urllib.request.Request(url, data=json.dumps(data).encode() if data else None,
    headers={"Authorization":f"Bearer {access_token}","Content-Type":"application/json"}, method=method)
  with urllib.request.urlopen(req) as r: return json.loads(r.read())

ruleset = api(f"https://firebasesecurityrules.googleapis.com/v1/projects/{project}/rulesets",
  {"source":{"files":[{"name":"firestore.rules","content":rules_content}]}})
print("Created ruleset:", ruleset['name'])

release_name = f"projects/{project}/releases/cloud.firestore"
try:
  result = api(f"https://firebasesecurityrules.googleapis.com/v1/{release_name}",
    {"name":release_name,"rulesetName":ruleset['name']}, method='PUT')
except:
  result = api(f"https://firebasesecurityrules.googleapis.com/v1/projects/{project}/releases",
    {"name":release_name,"rulesetName":ruleset['name']})
print("Released to Firestore:", result.get('name','ok'))
PYEOF

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: quiz-platform-e46ba
          channelId: live
